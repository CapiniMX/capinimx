<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⭐ Puntos Kids</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 15px; }
    h1 { color: #ffd700; margin-bottom: 15px; font-size: 1.8em; }

    .selector-nino { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
    .nino-btn { padding: 8px 16px; border: 2px solid #444; border-radius: 10px; background: #2a2a4a; color: #fff; font-size: 0.95em; cursor: pointer; transition: all 0.2s; }
    .nino-btn:hover { border-color: #ffd700; }
    .nino-btn.active { border-color: #ffd700; background: #3a3a6a; box-shadow: 0 0 10px #ffd70044; }

    .puntos-display { font-size: 2.5em; color: #ffd700; margin: 15px 0; font-weight: bold; }

    .puntos-botones { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; width: 100%; max-width: 420px; }
    .pto-btn { padding: 12px 5px; border: 2px solid #444; border-radius: 10px; background: #2a2a4a; color: #fff; font-size: 1em; cursor: pointer; transition: all 0.2s; text-align: center; }
    .pto-btn:hover { border-color: #4caf50; background: #2a4a2a; }
    .pto-btn:active { transform: scale(0.95); }

    .action-bar { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
    .registrar-btn { padding: 12px 25px; background: #4caf50; color: #fff; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: all 0.2s; }
    .registrar-btn:hover { background: #66bb6a; transform: scale(1.05); }
    .quitar-btn { padding: 12px 25px; background: #e74c3c; color: #fff; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: all 0.2s; }
    .quitar-btn:hover { background: #c0392b; transform: scale(1.05); }
    .msg { margin-top: 8px; color: #4caf50; font-size: 0.9em; height: 18px; }

    .tabs { display: flex; gap: 5px; margin: 20px 0 10px; }
    .tab { padding: 8px 16px; border: 2px solid #444; border-radius: 8px; background: #2a2a4a; color: #aaa; font-size: 0.9em; cursor: pointer; }
    .tab.active { border-color: #ffd700; color: #ffd700; background: #3a3a6a; }

    .totales { margin-top: 10px; background: #2a2a4a; padding: 15px; border-radius: 12px; width: 100%; max-width: 500px; }
    .totales h2 { color: #aaa; margin-bottom: 10px; font-size: 1.1em; }
    .totales-lista { list-style: none; }
    .totales-lista li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #3a3a5a; }
    .totales-lista li:last-child { border-bottom: none; }
    .totales-lista .pos { color: #888; font-size: 0.8em; width: 20px; }
    .totales-lista .tnom { color: #4caf50; font-weight: bold; }
    .totales-lista .tpts { color: #ffd700; font-weight: bold; }

    .historial { margin-top: 20px; width: 100%; max-width: 500px; }
    .historial h2 { color: #aaa; margin-bottom: 10px; font-size: 1.1em; }
    .historial-lista { list-style: none; max-height: 250px; overflow-y: auto; }
    .historial-lista li { background: #2a2a4a; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
    .historial-lista .nino { color: #4caf50; font-weight: bold; }
    .historial-lista .pts { color: #ffd700; font-weight: bold; }
    .historial-lista .pts-neg { color: #e74c3c; font-weight: bold; }
    .historial-lista .fecha { color: #888; font-size: 0.8em; }

    .reset-btn { margin-top: 20px; padding: 8px 20px; background: #c0392b; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85em; }
    .reset-btn:hover { background: #e74c3c; }

    @media (max-width: 400px) {
      .puntos-botones { grid-template-columns: repeat(5, 1fr); gap: 5px; }
      .pto-btn { padding: 10px 3px; font-size: 0.9em; }
      .puntos-display { font-size: 2em; }
    }
  </style>
</head>
<body>
  <h1>⭐ Registro de Puntos</h1>

  <div class="selector-nino">
    <button class="nino-btn active" onclick="selNino('Luke')">Luke</button>
    <button class="nino-btn" onclick="selNino('Dalia')">Dalia</button>
    <button class="nino-btn" onclick="selNino('Iris')">Iris</button>
  </div>

  <div class="puntos-display" id="puntos-display">+100</div>

  <div class="puntos-botones">
    <button class="pto-btn" onclick="selPts(100, this)">100</button>
    <button class="pto-btn" onclick="selPts(200, this)">200</button>
    <button class="pto-btn" onclick="selPts(300, this)">300</button>
    <button class="pto-btn" onclick="selPts(400, this)">400</button>
    <button class="pto-btn" onclick="selPts(500, this)">500</button>
  </div>

  <div class="action-bar">
    <button class="registrar-btn" onclick="registrar()">✅ Dar puntos</button>
    <button class="quitar-btn" onclick="quitar()">❌ Quitar puntos</button>
  </div>
  <div class="msg" id="msg"></div>

  <div class="tabs">
    <button class="tab active" id="tab-diario" onclick="verDiario()">📅 Hoy</button>
    <button class="tab" id="tab-semanal" onclick="verSemanal()">📆 Esta semana</button>
    <button class="tab" id="tab-total" onclick="verTotal()">🏆 Total</button>
  </div>

  <div class="totales">
    <h2 id="totales-titulo">Puntos de hoy</h2>
    <ul class="totales-lista" id="totales"></ul>
  </div>

  <div class="historial">
    <h2>📋 Últimos registros</h2>
    <ul class="historial-lista" id="historial"></ul>
  </div>

  <button class="reset-btn" onclick="resetear()">🗑️ Limpiar todo</button>

  <script>
    let nino = 'Luke';
    let puntos = 100;
    let vista = 'diario';
    const storageKey = 'puntos_kids_v3';

    function getToday() {
      return new Date().toISOString().split('T')[0];
    }

    function getWeekKey(d) {
      const date = new Date(d);
      date.setHours(0, 0, 0, 0);
      const dayNum = date.getDay();
      const diff = date.getDate() - dayNum + (dayNum === 0 ? -6 : 1);
      const monday = new Date(date.setDate(diff));
      const y = monday.getFullYear();
      const m = String(monday.getMonth() + 1).padStart(2, '0');
      const day = String(monday.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function selNino(n) {
      nino = n;
      document.querySelectorAll('.nino-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.nino-btn[onclick="selNino('${n}')"]`).classList.add('active');
    }

    function selPts(p, el) {
      puntos = p;
      document.getElementById('puntos-display').textContent = `+${puntos}`;
      document.querySelectorAll('.pto-btn').forEach(b => b.style.borderColor = '#444');
      el.style.borderColor = '#4caf50';
    }

    function getData() {
      return JSON.parse(localStorage.getItem(storageKey) || '{"historial":[],"totales":{"Luke":0,"Dalia":0,"Iris":0},"diario":{},"semanal":{}}');
    }

    function calcTotales(data, filtro) {
      const kids = ['Luke','Dalia','Iris'];
      let result;
      if (filtro === 'diario') {
        const hoy = getToday();
        result = kids.map(k => ({ n: k, p: (data.diario[hoy] && data.diario[hoy][k]) || 0 }));
      } else if (filtro === 'semanal') {
        const semana = getWeekKey(new Date());
        result = kids.map(k => ({ n: k, p: (data.semanal[semana] && data.semanal[semana][k]) || 0 }));
      } else {
        result = kids.map(k => ({ n: k, p: data.totales[k] || 0 }));
      }
      return result.sort((a, b) => b.p - a.p);
    }

    function verDiario() { vista = 'diario'; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-diario').classList.add('active'); document.getElementById('totales-titulo').textContent = 'Puntos de hoy'; render(getData()); }
    function verSemanal() { vista = 'semanal'; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-semanal').classList.add('active'); document.getElementById('totales-titulo').textContent = 'Puntos de esta semana'; render(getData()); }
    function verTotal() { vista = 'total'; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-total').classList.add('active'); document.getElementById('totales-titulo').textContent = 'Total acumulado'; render(getData()); }

    function fmt(d) {
      return new Date().toLocaleString('es-MX', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function render(data) {
      const tot = document.getElementById('totales');
      tot.innerHTML = '';
      calcTotales(data, vista).forEach((r, i) => {
        const li = document.createElement('li');
        const pos = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}º`;
        li.innerHTML = `<span><span class="pos">${pos}</span> <span class="tnom">${r.n}</span></span><span class="tpts">⭐ ${r.p}</span>`;
        tot.appendChild(li);
      });
      const hist = document.getElementById('historial');
      hist.innerHTML = '';
      [...data.historial].reverse().slice(0, 20).forEach(r => {
        const li = document.createElement('li');
        const cls = r.p < 0 ? 'pts-neg' : 'pts';
        const signo = r.p < 0 ? r.p : `+${r.p}`;
        li.innerHTML = `<span><span class="nino">${r.n}</span> <span class="${cls}">${signo}</span></span><span class="fecha">${r.f}</span>`;
        hist.appendChild(li);
      });
    }

    function registrar() {
      const data = getData();
      const hoy = getToday();
      const semana = getWeekKey(new Date());
      data.historial.push({ n: nino, p: puntos, f: fmt() });
      data.totales[nino] = (data.totales[nino] || 0) + puntos;
      if (!data.diario[hoy]) data.diario[hoy] = { Luke: 0, Dalia: 0, Iris: 0 };
      data.diario[hoy][nino] = (data.diario[hoy][nino] || 0) + puntos;
      if (!data.semanal[semana]) data.semanal[semana] = { Luke: 0, Dalia: 0, Iris: 0 };
      data.semanal[semana][nino] = (data.semanal[semana][nino] || 0) + puntos;
      localStorage.setItem(storageKey, JSON.stringify(data));
      render(data);
      const m = document.getElementById('msg');
      m.textContent = `✅ +${puntos} para ${nino}`;
      setTimeout(() => m.textContent = '', 2000);
    }

    function quitar() {
      const data = getData();
      const hoy = getToday();
      const semana = getWeekKey(new Date());
      const quitarPts = Math.min(puntos, data.totales[nino] || 0);
      data.historial.push({ n: nino, p: -quitarPts, f: fmt() });
      data.totales[nino] = Math.max(0, (data.totales[nino] || 0) - quitarPts);
      if (data.diario[hoy]) data.diario[hoy][nino] = Math.max(0, (data.diario[hoy][nino] || 0) - quitarPts);
      if (data.semanal[semana]) data.semanal[semana][nino] = Math.max(0, (data.semanal[semana][nino] || 0) - quitarPts);
      localStorage.setItem(storageKey, JSON.stringify(data));
      render(data);
      const m = document.getElementById('msg');
      m.textContent = `❌ -${quitarPts} para ${nino}`;
      setTimeout(() => m.textContent = '', 2000);
    }

    function resetear() {
      if (!confirm('¿Limpiar TODO el registro?')) return;
      localStorage.removeItem(storageKey);
      render(getData());
    }

    render(getData());
  </script>
</body>
</html>
